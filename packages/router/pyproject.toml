[project]
name = "router"
version = "0.1.0"
description = "Thin decision-policy and cache wrapper around litellm"
requires-python = ">=3.12"
dependencies = [
    "common",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/router"]

[tool.uv.sources]
common = { workspace = true }
