[project]
name = "felixs-router"
version = "0.1.0"
description = "Thin decision-policy and cache wrapper around litellm"
requires-python = ">=3.12"
dependencies = [
    "felixs-common",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/felixs_router"]

[tool.uv.sources]
felixs-common = { workspace = true }
