[project]
name = "felixs-common"
version = "0.1.0"
description = "Shared types and schemas for Felix's Tools"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/felixs_common"]
