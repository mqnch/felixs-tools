[project]
name = "felixs-brain"
version = "0.1.0"
description = "Structural knowledge graph of a codebase"
requires-python = ">=3.12"
dependencies = [
    "felixs-common",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/felixs_brain"]

[tool.uv.sources]
felixs-common = { workspace = true }
