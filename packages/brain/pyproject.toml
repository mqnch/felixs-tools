[project]
name = "brain"
version = "0.1.0"
description = "Structural knowledge graph of a codebase"
requires-python = ">=3.12"
dependencies = [
    "common",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/brain"]

[tool.uv.sources]
common = { workspace = true }
