[project]
name = "logger"
version = "0.1.0"
description = "Local log search and anomaly detection"
requires-python = ">=3.12"
dependencies = [
    "common",
    "router",
    "drain3>=0.9",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/logger"]

[tool.uv.sources]
common = { workspace = true }
router = { workspace = true }
