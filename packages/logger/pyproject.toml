[project]
name = "felixs-logger"
version = "0.1.0"
description = "Local log search and anomaly detection"
requires-python = ">=3.12"
dependencies = [
    "felixs-common",
    "felixs-router",
    "drain3>=0.9",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/felixs_logger"]

[tool.uv.sources]
felixs-common = { workspace = true }
felixs-router = { workspace = true }
