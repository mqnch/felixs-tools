[project]
name = "swarm"
version = "0.1.0"
description = "Preset DAG executor for Felix's Tools"
requires-python = ">=3.12"
dependencies = [
    "common",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/swarm"]

[tool.uv.sources]
common = { workspace = true }
